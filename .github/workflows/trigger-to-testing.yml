name: Notify fork on testing update

on:
  push:
    branches:
      - testing

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send repository_dispatch to fork
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: token ${{ secrets.PAT_TOKEN }}" \
            https://api.github.com/repos/Demonicp/Flores-Eternas-LP/dispatches \
            -d '{"event_type":"sync-testing"}'
