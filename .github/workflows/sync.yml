name: Sync Upstream Testing to Master
on:
  schedule:
    - cron: '0 * * * *'   # cada hora
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git remote add upstream https://github.com/ladyjvs2054/Flores-Eternas-LP.git
          git fetch upstream
          
          # Actualizar testing con solo el último commit de upstream/testing
          git checkout -B testing origin/testing
          git cherry-pick upstream/testing
          git push origin testing
          
          # Actualizar master con solo el último commit de testing
          git checkout -B master origin/master
          git cherry-pick testing
          git push origin master
