name: Sync Upstream Testing to Fork
on:
  schedule:
    - cron: '0 *'   # cada hora
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git remote add upstream https://github.com/Flores-Eternas-org/Flores-Eternas-org.git
          git fetch upstream

          # 1️⃣ Actualizar testing
          git checkout -B testing origin/testing
          git merge --ff-only upstream/testing
          git push origin testing

          # 2️⃣ Promover a master
          git checkout -B master origin/master  
          git merge --ff-only testing
          git push origin master
