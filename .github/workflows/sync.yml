name: Sync Upstream Testing to Fork
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git remote add upstream https://github.com/Flores-Eternas-org/Flores-Eternas-org.git
          git fetch upstream

          # 1️⃣ Actualizar testing en tu fork con el último commit de upstream/testing
          git checkout -B testing origin/testing
          git cherry-pick $(git rev-parse upstream/testing) -X theirs || git cherry-pick --skip
          git push origin testing

          # 2️⃣ Promover ese commit a master en tu fork
          git checkout -B master origin/master
          git cherry-pick $(git rev-parse testing) -X theirs || git cherry-pick --skip
          git push origin master
